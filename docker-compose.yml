services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    command: uv run uvicorn eset_incident_ai.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    command: uv run celery -A eset_incident_ai.infrastructure.queue.celery_app worker --loglevel=INFO
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run celery -A eset_incident_ai.infrastructure.queue.celery_app inspect ping --destination celery@$$HOSTNAME --timeout=5 | grep -q OK",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: deploy/docker/worker.Dockerfile
    command: uv run celery -A eset_incident_ai.infrastructure.queue.celery_app beat --loglevel=INFO
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: incident_ai
      POSTGRES_USER: incident_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_ai -d incident_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  redis_data:
  ollama_data:
